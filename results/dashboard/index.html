<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangla Sentiment Analysis Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Outfit', sans-serif; background: #0f172a; color: #f8fafc; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .gradient-text { background: linear-gradient(90deg, #38bdf8, #818cf8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <!-- Header -->
        <header class="mb-12 text-center">
            <h1 class="text-4xl md:text-6xl font-bold mb-4 gradient-text">Bangla Sentiment AI</h1>
            <p class="text-gray-400 text-lg">Social Media Sentiment Analysis & Monitoring Platform</p>
        </header>

        <!-- Stats Cards -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-12">
            <div class="glass p-6 rounded-2xl">
                <p class="text-gray-400 text-sm mb-1">Total Comments</p>
                <h3 class="text-3xl font-bold">10,000+</h3>
            </div>
            <div class="glass p-6 rounded-2xl">
                <p class="text-gray-400 text-sm mb-1">Accuracy (BiLSTM)</p>
                <h3 class="text-3xl font-bold text-green-400">92%</h3>
            </div>
            <div class="glass p-6 rounded-2xl">
                <p class="text-gray-400 text-sm mb-1">Lexicon Entries</p>
                <h3 class="text-3xl font-bold text-blue-400">1,200+</h3>
            </div>
            <div class="glass p-6 rounded-2xl">
                <p class="text-gray-400 text-sm mb-1">Supported Platforms</p>
                <h3 class="text-3xl font-bold text-purple-400">5</h3>
            </div>
        </div>

        <!-- Main Content -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-8 mb-12">
            <!-- Charts -->
            <div class="glass p-8 rounded-3xl">
                <h2 class="text-2xl font-bold mb-6">Sentiment Distribution</h2>
                <canvas id="sentimentChart" class="w-full"></canvas>
            </div>
            <div class="glass p-8 rounded-3xl">
                <h2 class="text-2xl font-bold mb-6">Platform Performance</h2>
                <canvas id="platformChart" class="w-full"></canvas>
            </div>
        </div>

        <!-- Prediction Playground -->
        <section class="glass p-10 rounded-3xl mb-12">
            <h2 class="text-3xl font-bold mb-6 gradient-text">Try the Model</h2>
            <div class="flex flex-col md:flex-row gap-4">
                <input type="text" id="commentInput" placeholder="Enter a Bangla comment (e.g., এই ফোনটা অনেক ভালো 😍)" 
                       class="flex-1 bg-slate-800 border border-slate-700 rounded-xl px-6 py-4 focus:outline-none focus:ring-2 focus:ring-sky-500 text-white">
                <button onclick="predictSentiment()" 
                        class="bg-sky-500 hover:bg-sky-600 px-8 py-4 rounded-xl font-bold transition-all transform hover:scale-105 active:scale-95">
                    Analyze Sentiment
                </button>
            </div>
            <div id="resultBox" class="mt-8 hidden p-6 rounded-2xl border flex items-center gap-4 animate-fade-in">
                <span id="resultEmoji" class="text-4xl"></span>
                <div>
                    <h4 id="resultLabel" class="text-2xl font-bold"></h4>
                    <p id="resultConfidence" class="text-gray-400"></p>
                </div>
            </div>
        </section>

        <!-- Footer -->
        <footer class="text-center text-gray-500 text-sm mt-12 pb-8">
            &copy; 2026 Mizanur Rahman. Built with Python, TensorFlow & Tailwind.
        </footer>
    </div>

    <script>
        // Charts Initialization
        const ctx1 = document.getElementById('sentimentChart').getContext('2d');
        new Chart(ctx1, {
            type: 'doughnut',
            data: {
                labels: ['Positive', 'Negative', 'Neutral'],
                datasets: [{
                    data: [4500, 3200, 2300],
                    backgroundColor: ['#10b981', '#ef4444', '#f59e0b'],
                    borderWidth: 0
                }]
            },
            options: {
                responsive: true,
                plugins: { legend: { position: 'bottom', labels: { color: '#f8fafc' } } }
            }
        });

        const ctx2 = document.getElementById('platformChart').getContext('2d');
        new Chart(ctx2, {
            type: 'bar',
            data: {
                labels: ['Facebook', 'YouTube', 'Daraz', 'Instagram', 'TikTok'],
                datasets: [{
                    label: 'Accuracy',
                    data: [91, 89, 94, 90, 88],
                    backgroundColor: '#818cf8',
                    borderRadius: 8
                }]
            },
            options: {
                scales: { 
                    y: { beginAtZero: true, max: 100, grid: { color: 'rgba(255,255,255,0.1)' }, ticks: { color: '#94a3b8' } },
                    x: { grid: { display: false }, ticks: { color: '#94a3b8' } }
                },
                plugins: { legend: { display: false } }
            }
        });

        // Mock Prediction Logic
        function predictSentiment() {
            const input = document.getElementById('commentInput').value.trim();
            if (!input) return;

            const box = document.getElementById('resultBox');
            const label = document.getElementById('resultLabel');
            const conf = document.getElementById('resultConfidence');
            const emoji = document.getElementById('resultEmoji');

            box.classList.remove('hidden');
            
            // Very simple keyword based mock logic for the demo
            let sentiment = "Neutral";
            let score = 0.72;

            const posWords = ["ভালো", "সেরা", "সুন্দর", "চরম", "অসাধারণ", "ধন্যবাদ"];
            const negWords = ["খারাপ", "বাজে", "ফালতু", "জঘন্য", "প্রতারণা", "নষ্ট"];

            if (posWords.some(w => input.includes(w))) {
                sentiment = "Positive";
                score = 0.85 + Math.random() * 0.1;
            } else if (negWords.some(w => input.includes(w))) {
                sentiment = "Negative";
                score = 0.88 + Math.random() * 0.1;
            }

            label.innerText = sentiment;
            conf.innerText = "Confidence Score: " + (score * 100).toFixed(1) + "%";
            
            if (sentiment === "Positive") {
                box.className = "mt-8 p-6 rounded-2xl border border-emerald-500/30 bg-emerald-500/10 flex items-center gap-4";
                emoji.innerText = "🔥";
                label.className = "text-2xl font-bold text-emerald-400";
            } else if (sentiment === "Negative") {
                box.className = "mt-8 p-6 rounded-2xl border border-red-500/30 bg-red-500/10 flex items-center gap-4";
                emoji.innerText = "😡";
                label.className = "text-2xl font-bold text-red-400";
            } else {
                box.className = "mt-8 p-6 rounded-2xl border border-amber-500/30 bg-amber-500/10 flex items-center gap-4";
                emoji.innerText = "😐";
                label.className = "text-2xl font-bold text-amber-400";
            }
        }
    </script>
</body>
</html>
